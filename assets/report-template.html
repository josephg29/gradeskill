<!--
  Codebase Report Card Template — OpenCode terminal / TUI theme
  (matches the gradeskill.dev landing page: monospace, sharp panels,
  grayscale UI, letter grades as the only color).

  Placeholders to replace (find-and-replace when filling in):
    {{TITLE}}              — e.g., "Sentiph UI Report Card" or "Sentiph Full Audit"
    {{TIMESTAMP}}          — ISO timestamp of when this was generated
    {{OVERALL_GRADE}}      — Letter grade for overall (category grade or GPA letter): A/B/C/D/F
    {{OVERALL_SCORE}}      — Numeric score 0-100 (or GPA like "3.2 / 4.0" for `everything`)
    {{OVERALL_LABEL}}      — "Overall Score" or "GPA" depending on mode
    {{CATEGORIES_HTML}}    — One <section class="category"> block per category
    {{SUMMARY}}            — 2-3 sentence high-level summary of the grade
    {{LOOP_PROGRESSION}}   — Optional score timeline for loop mode, else empty string

  CATEGORY BLOCK TEMPLATE
  ─────────────────────────────────────────────────────────────────────────────
  Replace tokens, repeat for each category, then concat into {{CATEGORIES_HTML}}.
  {{LETTER}} is the base letter A/B/C/D/F (drives color); display text may be "A-".

    <section class="category">
      <header class="category-header">
        <div class="bar-dots"><span></span><span></span><span></span></div>
        <span class="category-file">{{CATEGORY_NAME}}-report.html</span>
      </header>
      <div class="category-overall">
        <div class="cat-grade grade-{{LETTER}}">[{{LETTER}}]</div>
        <div class="cat-meta">
          <h2>{{CATEGORY_NAME}}</h2>
          <div class="score">{{SCORE}} / 100</div>
        </div>
      </div>
      <div class="aspects-grid">
        {{ASPECT_CARDS}}
      </div>
      <div class="fixes-section">
        <h3># fixes (prioritized)</h3>
        <ol>{{FIX_ITEMS}}</ol>
      </div>
    </section>

  ASPECT CARD TEMPLATE (repeat 6× inside {{ASPECT_CARDS}})
  ─────────────────────────────────────────────────────────────────────────────
    <div class="aspect-card">
      <div class="aspect-header">
        <span class="aspect-name">{{ASPECT_NAME}}</span>
        <span class="aspect-grade grade-{{ASPECT_LETTER}}">[{{ASPECT_LETTER}}]</span>
      </div>
      <div class="aspect-body">
        <div class="aspect-section good">
          <span class="aspect-label">+ good</span>
          <p>{{GOOD_TEXT}}</p>
        </div>
        <div class="aspect-section improve">
          <span class="aspect-label">! improve</span>
          <p>{{IMPROVE_TEXT}}</p>
        </div>
      </div>
    </div>

  LOOP PROGRESSION (optional, for {{LOOP_PROGRESSION}})
  ─────────────────────────────────────────────────────────────────────────────
    <section class="progression">
      <h3># score progression</h3>
      <div class="progression-rows">
        <div class="progression-row">
          <span class="round">r1</span>
          <span class="bar"><span class="bar-fill" style="width:72%"></span></span>
          <span class="val">72</span>
          <span class="delta">—</span>
        </div>
        <!-- repeat per round; .delta.neg for regressions -->
      </div>
    </section>

  grade-{{LETTER}} controls color. Valid letters: A, B, C, D, F.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{{TITLE}}</title>
<style>
  :root {
    --ink-0: #0a0a0a;   /* base bg */
    --ink-1: #0f0f0e;   /* panel */
    --ink-2: #141413;   /* raised */
    --paper: #e9e6df;   /* text */
    --rule: rgba(233,230,223,.12);
    --rule-soft: rgba(233,230,223,.06);
    --accent: #a8a8a2;
    --accent-soft: #ffffff;
    --accent-dim: #6b6862;
    /* grade scale — the ONLY color in the system */
    --grade-a: #4ade80;
    --grade-b: #a3e635;
    --grade-c: #facc15;
    --grade-d: #fb923c;
    --grade-f: #f87171;
    --mono: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { color-scheme: dark; }
  body {
    background: var(--ink-0);
    color: var(--paper);
    font-family: var(--mono);
    font-size: 15px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    position: relative;
  }
  /* faint terminal grid + top glow */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    z-index: -2;
    background-image:
      linear-gradient(to right, rgba(233,230,223,.025) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(233,230,223,.025) 1px, transparent 1px);
    background-size: 56px 56px;
    -webkit-mask-image: radial-gradient(ellipse 75% 55% at 50% 0%, #000 30%, transparent 72%);
    mask-image: radial-gradient(ellipse 75% 55% at 50% 0%, #000 30%, transparent 72%);
  }
  body::after {
    content: "";
    position: fixed;
    inset-inline: 0;
    top: 0;
    height: 420px;
    z-index: -1;
    background: radial-gradient(ellipse 55% 55% at 50% -12%, rgba(233,230,223,0.07), transparent);
    pointer-events: none;
  }
  .container { max-width: 1040px; margin: 0 auto; padding: 56px 24px 96px; }

  /* ── Report header ── */
  header.report-header {
    border-bottom: 1px solid var(--rule);
    padding-bottom: 24px;
    margin-bottom: 36px;
  }
  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent-dim);
    margin-bottom: 14px;
  }
  .eyebrow::before { content: "# "; color: var(--accent); }
  h1 {
    font-size: 34px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin-bottom: 12px;
  }
  .timestamp { font-size: 12px; color: var(--accent-dim); }
  .timestamp::before { content: "$ "; color: var(--accent); }

  /* ── Overall grade panel ── */
  .overall {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 28px;
    align-items: center;
    padding: 32px 34px;
    background: var(--ink-1);
    border: 1px solid var(--rule);
    margin-bottom: 36px;
  }
  .overall-info .label {
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent-dim);
    margin-bottom: 12px;
  }
  .overall-info .summary {
    font-size: 14.5px;
    line-height: 1.65;
    color: rgba(233,230,223,.62);
    max-width: 60ch;
  }
  .overall-score {
    text-align: right;
    flex-shrink: 0;
  }
  .overall-grade {
    font-size: 92px;
    line-height: 0.92;
    font-weight: 700;
    letter-spacing: -0.03em;
  }
  .overall-score .score {
    margin-top: 10px;
    font-size: 14px;
    color: var(--accent-dim);
  }

  /* ── Category panel ── */
  .category {
    background: var(--ink-1);
    border: 1px solid var(--rule);
    margin-bottom: 26px;
  }
  .category-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 16px;
    border-bottom: 1px solid var(--rule);
    background: var(--ink-0);
    font-size: 12px;
    color: var(--accent-dim);
  }
  .bar-dots { display: flex; gap: 6px; }
  .bar-dots span {
    width: 10px; height: 10px;
    border: 1px solid rgba(233,230,223,.20);
    display: block;
  }
  .category-overall {
    display: flex;
    align-items: center;
    gap: 24px;
    padding: 24px 30px;
  }
  .cat-grade {
    font-size: 46px;
    line-height: 1;
    font-weight: 700;
    letter-spacing: -0.02em;
    flex-shrink: 0;
  }
  .cat-meta h2 {
    font-size: 18px;
    font-weight: 700;
    text-transform: lowercase;
    letter-spacing: -0.01em;
    margin-bottom: 4px;
  }
  .cat-meta .score { font-size: 13px; color: var(--accent-dim); }

  /* ── Aspects grid ── */
  .aspects-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--rule);
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
  }
  .aspect-card {
    background: var(--ink-1);
    padding: 18px 20px 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .aspect-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 8px;
  }
  .aspect-name {
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 700;
  }
  .aspect-grade {
    font-size: 22px;
    font-weight: 700;
    line-height: 1;
    flex-shrink: 0;
  }
  .aspect-body { display: flex; flex-direction: column; gap: 9px; flex: 1; }
  .aspect-section {
    padding: 9px 11px;
    border-left: 2px solid var(--rule);
    background: var(--rule-soft);
  }
  .aspect-section.good { border-left-color: var(--grade-a); }
  .aspect-section.improve { border-left-color: var(--grade-d); }
  .aspect-label {
    display: block;
    font-size: 9.5px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    font-weight: 700;
    margin-bottom: 5px;
  }
  .aspect-section.good .aspect-label { color: var(--grade-a); }
  .aspect-section.improve .aspect-label { color: var(--grade-d); }
  .aspect-section p { font-size: 13px; line-height: 1.55; color: rgba(233,230,223,.72); }
  .aspect-section code {
    font-size: 12px;
    background: var(--ink-0);
    border: 1px solid var(--rule);
    padding: 0.5px 4px;
    color: var(--paper);
  }

  /* ── Fixes section ── */
  .fixes-section { padding: 22px 30px 26px; }
  .fixes-section h3 {
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 16px;
  }
  .fixes-section ol { list-style: none; counter-reset: fix; }
  .fixes-section li {
    counter-increment: fix;
    position: relative;
    padding-left: 30px;
    margin-bottom: 11px;
    font-size: 13.5px;
    line-height: 1.6;
    color: rgba(233,230,223,.78);
  }
  .fixes-section li::before {
    content: counter(fix, decimal-leading-zero);
    position: absolute;
    left: 0;
    top: 0;
    color: var(--accent);
    font-weight: 700;
  }
  .fixes-section code {
    font-size: 12px;
    background: var(--ink-0);
    border: 1px solid var(--rule);
    padding: 0.5px 4px;
    color: var(--paper);
  }

  /* ── Loop progression ── */
  .progression {
    background: var(--ink-1);
    border: 1px solid var(--rule);
    padding: 24px 30px;
    margin-bottom: 36px;
  }
  .progression h3 {
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 18px;
  }
  .progression-rows { display: grid; gap: 10px; }
  .progression-row {
    display: grid;
    grid-template-columns: 48px 1fr 52px 64px;
    align-items: center;
    gap: 16px;
    font-size: 13px;
  }
  .progression-row .round { color: var(--accent-dim); }
  .progression-row .bar {
    height: 10px;
    background: var(--ink-0);
    border: 1px solid var(--rule);
    position: relative;
    overflow: hidden;
  }
  .progression-row .bar-fill {
    position: absolute;
    inset: 0 auto 0 0;
    height: 100%;
    background: var(--accent);
  }
  .progression-row .val { color: var(--paper); }
  .progression-row .delta { text-align: right; color: var(--grade-a); }
  .progression-row .delta.neg { color: var(--grade-f); }

  /* ── Grade colors ── */
  .grade-A { color: var(--grade-a); }
  .grade-B { color: var(--grade-b); }
  .grade-C { color: var(--grade-c); }
  .grade-D { color: var(--grade-d); }
  .grade-F { color: var(--grade-f); }

  /* ── Footer ── */
  footer {
    margin-top: 48px;
    padding-top: 22px;
    border-top: 1px solid var(--rule);
    text-align: center;
    font-size: 11px;
    color: var(--accent-dim);
    letter-spacing: 0.1em;
  }
  footer::before { content: "$ "; color: var(--accent); }

  /* ── Responsive ── */
  @media (max-width: 760px) {
    .container { padding: 32px 16px 56px; }
    h1 { font-size: 26px; }
    .overall { grid-template-columns: 1fr; gap: 20px; }
    .overall-score { text-align: left; }
    .overall-grade { font-size: 72px; }
    .aspects-grid { grid-template-columns: repeat(2, 1fr); }
    .category-overall { padding: 20px; }
    .fixes-section { padding: 18px 20px 22px; }
  }
  @media (max-width: 480px) {
    .aspects-grid { grid-template-columns: 1fr; }
  }

  /* ── Print / PDF ── */
  @media print {
    html, body { background: #fff; color: #111; }
    body::before, body::after { display: none; }
    .overall, .category, .progression { break-inside: avoid; border-color: #ccc; background: #fff; }
    .aspect-card { break-inside: avoid; background: #fff; }
    .aspect-section p, .fixes-section li, .overall-info .summary { color: #222; }
    a { text-decoration: none; color: inherit; }
  }
</style>
</head>
<body>
<div class="container">
  <header class="report-header">
    <div class="eyebrow">codebase report card</div>
    <h1>{{TITLE}}</h1>
    <div class="timestamp">{{TIMESTAMP}}</div>
  </header>

  <div class="overall">
    <div class="overall-info">
      <div class="label">{{OVERALL_LABEL}}</div>
      <div class="summary">{{SUMMARY}}</div>
    </div>
    <div class="overall-score">
      <div class="overall-grade grade-{{OVERALL_GRADE}}">{{OVERALL_GRADE}}</div>
      <div class="score">{{OVERALL_SCORE}}</div>
    </div>
  </div>

  {{LOOP_PROGRESSION}}

  {{CATEGORIES_HTML}}

  <footer>
    Generated by grade · {{TIMESTAMP}}
  </footer>
</div>
</body>
</html>
