<!--
  Codebase Report Card Template

  Placeholders to replace (find-and-replace when filling in):
    {{TITLE}}              — e.g., "Sentiph UI Report Card" or "Sentiph Full Audit"
    {{TIMESTAMP}}          — ISO timestamp of when this was generated
    {{OVERALL_GRADE}}      — Letter grade for overall (category grade or GPA letter)
    {{OVERALL_SCORE}}      — Numeric score 0-100 (or GPA like "3.2 / 4.0" for `everything`)
    {{OVERALL_LABEL}}      — "Overall Score" or "GPA" depending on mode
    {{CATEGORIES_HTML}}    — One <section class="category"> block per category
    {{SUMMARY}}            — 2-3 sentence high-level summary of the grade
    {{LOOP_PROGRESSION}}   — Optional score timeline for loop mode, else empty string

  CATEGORY BLOCK TEMPLATE
  ─────────────────────────────────────────────────────────────────────────────
  Replace tokens, repeat for each category, then concat into {{CATEGORIES_HTML}}.

    <section class="category">
      <header class="category-header">
        <div class="category-grade grade-{{LETTER}}">{{LETTER}}</div>
        <div class="category-meta">
          <h2>{{CATEGORY_NAME}}</h2>
          <div class="score">{{SCORE}}/100</div>
        </div>
      </header>
      <div class="aspects-grid">
        {{ASPECT_CARDS}}
      </div>
      <div class="fixes-section">
        <h3>Fixes (prioritized)</h3>
        <ol>{{FIX_ITEMS}}</ol>
      </div>
    </section>

  ASPECT CARD TEMPLATE (repeat 6× inside {{ASPECT_CARDS}})
  ─────────────────────────────────────────────────────────────────────────────
    <div class="aspect-card">
      <div class="aspect-header">
        <span class="aspect-name">{{ASPECT_NAME}}</span>
        <span class="aspect-grade grade-{{ASPECT_LETTER}}">{{ASPECT_LETTER}}</span>
      </div>
      <div class="aspect-body">
        <div class="aspect-section good">
          <span class="aspect-label">Good</span>
          <p>{{GOOD_TEXT}}</p>
        </div>
        <div class="aspect-section improve">
          <span class="aspect-label">Improve</span>
          <p>{{IMPROVE_TEXT}}</p>
        </div>
      </div>
    </div>

  grade-{{LETTER}} controls color. Valid letters: A, B, C, D, F.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{{TITLE}}</title>
<style>
  :root {
    --bg: #fafaf7;
    --paper: #ffffff;
    --ink: #1a1a1a;
    --muted: #6b6b6b;
    --rule: #e5e3dc;
    --good: #1f7a3f;
    --improve: #7a4a1f;
    --fix: #1e4a8e;
    --grade-a: #1f7a3f;
    --grade-b: #4a8e3d;
    --grade-c: #c98a1e;
    --grade-d: #d96b1f;
    --grade-f: #b03a2e;
    --good-bg: #f0faf3;
    --improve-bg: #fdf5ee;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Iowan Old Style', 'Cormorant Garamond', Georgia, 'Times New Roman', serif;
    font-size: 16px;
    line-height: 1.6;
  }
  .container {
    max-width: 980px;
    margin: 0 auto;
    padding: 48px 32px 80px;
  }

  /* ── Report header ── */
  header.report-header {
    border-bottom: 2px solid var(--ink);
    padding-bottom: 24px;
    margin-bottom: 32px;
  }
  .eyebrow {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  h1 {
    font-size: 40px;
    font-weight: 500;
    letter-spacing: -0.01em;
    margin-bottom: 12px;
  }
  .timestamp {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  /* ── Overall grade card ── */
  .overall {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 32px;
    align-items: center;
    padding: 32px;
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: 4px;
    margin-bottom: 40px;
  }
  .overall-grade {
    font-size: 128px;
    line-height: 1;
    font-weight: 600;
    font-family: 'Iowan Old Style', Georgia, serif;
  }
  .overall-info .label {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .overall-info .score {
    font-size: 30px;
    margin-bottom: 12px;
    font-weight: 500;
  }
  .overall-info .summary {
    font-size: 16px;
    color: var(--ink);
  }

  /* ── Category section ── */
  .category {
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: 4px;
    margin-bottom: 28px;
    overflow: hidden;
  }
  .category-header {
    display: flex;
    align-items: center;
    gap: 24px;
    padding: 24px 32px;
    border-bottom: 1px solid var(--rule);
    background: #fbfbf8;
  }
  .category-grade {
    font-size: 60px;
    line-height: 1;
    font-weight: 600;
    width: 72px;
    text-align: center;
    flex-shrink: 0;
  }
  .category-meta h2 {
    font-size: 22px;
    font-weight: 500;
    text-transform: capitalize;
    margin-bottom: 2px;
  }
  .category-meta .score {
    font-family: 'Courier New', monospace;
    font-size: 13px;
    color: var(--muted);
  }

  /* ── Aspects grid ── */
  .aspects-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--rule);
    border-bottom: 1px solid var(--rule);
  }
  .aspect-card {
    background: var(--paper);
    padding: 20px 22px 22px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .aspect-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 8px;
  }
  .aspect-name {
    font-size: 13px;
    font-family: 'Courier New', monospace;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
  }
  .aspect-grade {
    font-size: 36px;
    font-weight: 600;
    line-height: 1;
    font-family: 'Iowan Old Style', Georgia, serif;
    flex-shrink: 0;
  }
  .aspect-body {
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex: 1;
  }
  .aspect-section {
    border-radius: 3px;
    padding: 10px 12px;
  }
  .aspect-section.good { background: var(--good-bg); }
  .aspect-section.improve { background: var(--improve-bg); }
  .aspect-label {
    display: block;
    font-family: 'Courier New', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .aspect-section.good .aspect-label { color: var(--good); }
  .aspect-section.improve .aspect-label { color: var(--improve); }
  .aspect-section p {
    font-size: 13.5px;
    line-height: 1.5;
    color: var(--ink);
  }

  /* ── Fixes section ── */
  .fixes-section {
    padding: 22px 32px 26px;
  }
  .fixes-section h3 {
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: 700;
    color: var(--fix);
    margin-bottom: 14px;
  }
  .fixes-section ol {
    padding-left: 20px;
  }
  .fixes-section li {
    margin-bottom: 8px;
    font-size: 15px;
    line-height: 1.5;
  }

  /* ── Loop progression ── */
  .progression {
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 24px 32px;
    margin-bottom: 40px;
  }
  .progression h3 {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }
  .progression-rows { display: grid; gap: 8px; }
  .progression-row {
    display: grid;
    grid-template-columns: 80px 1fr 100px;
    align-items: center;
    gap: 16px;
    font-family: 'Courier New', monospace;
    font-size: 13px;
  }
  .progression-row .round { color: var(--muted); }
  .progression-row .bar {
    height: 8px;
    background: var(--rule);
    border-radius: 2px;
    position: relative;
    overflow: hidden;
  }
  .progression-row .bar-fill {
    position: absolute;
    top: 0; left: 0;
    height: 100%;
    background: var(--ink);
  }
  .progression-row .delta { text-align: right; color: var(--good); }
  .progression-row .delta.neg { color: var(--grade-f); }

  /* ── Grade colors ── */
  .grade-A { color: var(--grade-a); }
  .grade-B { color: var(--grade-b); }
  .grade-C { color: var(--grade-c); }
  .grade-D { color: var(--grade-d); }
  .grade-F { color: var(--grade-f); }

  /* ── Footer ── */
  footer {
    margin-top: 48px;
    padding-top: 24px;
    border-top: 1px solid var(--rule);
    text-align: center;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  /* ── Responsive ── */
  @media (max-width: 760px) {
    .container { padding: 24px 16px 48px; }
    h1 { font-size: 26px; }
    .overall { grid-template-columns: 1fr; text-align: center; }
    .overall-grade { font-size: 88px; }
    .aspects-grid { grid-template-columns: repeat(2, 1fr); }
    .category-header { padding: 18px 20px; }
    .fixes-section { padding: 18px 20px; }
  }
  @media (max-width: 480px) {
    .aspects-grid { grid-template-columns: 1fr; }
  }

  /* ── Print / PDF ── */
  @media print {
    body { background: #fff; }
    .container { padding: 0; max-width: none; }
    .overall, .category, .progression { break-inside: avoid; }
    .aspect-card { break-inside: avoid; }
    .category { box-shadow: none; }
    a { text-decoration: none; color: inherit; }
  }
</style>
</head>
<body>
<div class="container">
  <header class="report-header">
    <div class="eyebrow">Codebase Report Card</div>
    <h1>{{TITLE}}</h1>
    <div class="timestamp">{{TIMESTAMP}}</div>
  </header>

  <div class="overall">
    <div class="overall-grade grade-{{OVERALL_GRADE}}">{{OVERALL_GRADE}}</div>
    <div class="overall-info">
      <div class="label">{{OVERALL_LABEL}}</div>
      <div class="score">{{OVERALL_SCORE}}</div>
      <div class="summary">{{SUMMARY}}</div>
    </div>
  </div>

  {{LOOP_PROGRESSION}}

  {{CATEGORIES_HTML}}

  <footer>
    Generated by grade · {{TIMESTAMP}}
  </footer>
</div>
</body>
</html>
